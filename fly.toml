app = "app-green-shape-6756"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  DB_PATH  = "/data/sahha.db"
  PORT     = "3000"
  HOSTNAME = "0.0.0.0"

[[mounts]]
  source      = "sahha_data"
  destination = "/data"
  initial_size = "1gb"

[http_service]
  internal_port       = 3000
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1

[checks]
  [checks.health]
    grace_period = "30s"
    interval     = "30s"
    method       = "GET"
    path         = "/api/health"
    port         = 3000
    timeout      = "10s"
    type         = "http"
