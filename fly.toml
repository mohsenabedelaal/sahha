app = "sahha"
primary_region = "iad"

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"
  DATABASE_PATH = "/data/sahha.db"

# Run DB schema push before each new deployment
[deploy]
  release_command = "npx drizzle-kit push --config=drizzle.config.ts"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Persistent volume for SQLite database
[[mounts]]
  source = "sahha_data"
  destination = "/data"
  initial_size = "1gb"
