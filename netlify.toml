[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# Scheduled functions (replacing Vercel crons)
[functions."send-reminders"]
  schedule = "0 * * * *"

[functions."update-streaks"]
  schedule = "0 0 * * *"
